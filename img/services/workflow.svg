<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#F0FDFA"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="12" fill="url(#bg1)"/>
  <!-- Flow nodes -->
  <rect x="30" y="70" width="70" height="60" rx="10" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="37" y="85" width="56" height="6" rx="3" fill="#2563EB" opacity="0.4"/>
  <rect x="37" y="97" width="40" height="6" rx="3" fill="#2563EB" opacity="0.25"/>
  <rect x="37" y="109" width="48" height="6" rx="3" fill="#2563EB" opacity="0.3"/>
  <!-- Arrow 1 -->
  <line x1="105" y1="100" x2="140" y2="100" stroke="#2563EB" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="140,95 150,100 140,105" fill="#2563EB" opacity="0.6"/>
  <!-- Gear node -->
  <circle cx="190" cy="100" r="35" fill="#0D9488" opacity="0.12" stroke="#0D9488" stroke-width="1.5"/>
  <circle cx="190" cy="100" r="14" stroke="#0D9488" stroke-width="2" fill="none"/>
  <circle cx="190" cy="100" r="5" fill="#0D9488" opacity="0.5"/>
  <line x1="190" y1="80" x2="190" y2="72" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="190" y1="120" x2="190" y2="128" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="100" x2="162" y2="100" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="210" y1="100" x2="218" y2="100" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow 2 -->
  <line x1="230" y1="100" x2="265" y2="100" stroke="#0D9488" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="265,95 275,100 265,105" fill="#0D9488" opacity="0.6"/>
  <!-- Output nodes -->
  <rect x="280" y="55" width="90" height="30" rx="8" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="290" y="66" width="50" height="5" rx="2.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="280" y="95" width="90" height="30" rx="8" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="290" y="106" width="60" height="5" rx="2.5" fill="#2563EB" opacity="0.5"/>
  <rect x="280" y="135" width="90" height="30" rx="8" fill="#0D9488" opacity="0.15" stroke="#0D9488" stroke-width="1.5"/>
  <rect x="290" y="146" width="45" height="5" rx="2.5" fill="#0D9488" opacity="0.5"/>
  <!-- Connector lines to outputs -->
  <line x1="275" y1="100" x2="280" y2="70" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="100" x2="280" y2="110" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="100" x2="280" y2="150" stroke="#0D9488" stroke-width="1" opacity="0.4"/>
  <!-- Label -->
  <text x="65" y="48" font-family="Inter, sans-serif" font-size="11" fill="#2563EB" font-weight="600" text-anchor="middle">Input</text>
  <text x="190" y="48" font-family="Inter, sans-serif" font-size="11" fill="#0D9488" font-weight="600" text-anchor="middle">Process</text>
  <text x="325" y="42" font-family="Inter, sans-serif" font-size="11" fill="#F59E0B" font-weight="600" text-anchor="middle">Output</text>
</svg>