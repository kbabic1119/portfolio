<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#F0FDFA"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="12" fill="url(#bg6)"/>
  <!-- Funnel visualization -->
  <!-- Top of funnel - wide -->
  <path d="M60 30 L340 30 L310 70 L90 70Z" fill="#2563EB" opacity="0.1" stroke="#2563EB" stroke-width="1.5"/>
  <text x="200" y="55" font-family="Inter, sans-serif" font-size="11" fill="#2563EB" font-weight="600" text-anchor="middle">1,200 Visitors</text>
  <!-- Middle funnel -->
  <path d="M90 75 L310 75 L280 115 L120 115Z" fill="#0D9488" opacity="0.12" stroke="#0D9488" stroke-width="1.5"/>
  <text x="200" y="100" font-family="Inter, sans-serif" font-size="11" fill="#0D9488" font-weight="600" text-anchor="middle">340 Leads</text>
  <!-- Bottom funnel -->
  <path d="M120 120 L280 120 L250 155 L150 155Z" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="200" y="142" font-family="Inter, sans-serif" font-size="11" fill="#D97706" font-weight="600" text-anchor="middle">85 Qualified</text>
  <!-- Converted -->
  <path d="M150 160 L250 160 L230 185 L170 185Z" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="177" font-family="Inter, sans-serif" font-size="10" fill="#059669" font-weight="700" text-anchor="middle">28 Clients</text>
  <!-- Side labels / arrows -->
  <text x="35" y="55" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8" text-anchor="end">Scrape</text>
  <line x1="38" y1="52" x2="55" y2="52" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="35" y="98" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8" text-anchor="end">Enrich</text>
  <line x1="38" y1="95" x2="85" y2="95" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="35" y="140" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8" text-anchor="end">Score</text>
  <line x1="38" y1="137" x2="115" y2="137" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="35" y="177" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8" text-anchor="end">Close</text>
  <line x1="38" y1="174" x2="165" y2="174" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Conversion rates on right -->
  <text x="365" y="68" font-family="Inter, sans-serif" font-size="9" fill="#2563EB" text-anchor="start">28.3%</text>
  <path d="M345 50 L345 65 L355 57" stroke="#2563EB" stroke-width="1" fill="none"/>
  <text x="365" y="113" font-family="Inter, sans-serif" font-size="9" fill="#0D9488" text-anchor="start">25.0%</text>
  <path d="M345 95 L345 110 L355 102" stroke="#0D9488" stroke-width="1" fill="none"/>
  <text x="365" y="155" font-family="Inter, sans-serif" font-size="9" fill="#D97706" text-anchor="start">32.9%</text>
  <path d="M345 137 L345 152 L355 145" stroke="#F59E0B" stroke-width="1" fill="none"/>
</svg>