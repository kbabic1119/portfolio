<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA"/>
      <stop offset="100%" style="stop-color:#FFFBEB"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="12" fill="url(#bg5)"/>
  <!-- Email template preview -->
  <rect x="25" y="20" width="150" height="160" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="25" y="20" width="150" height="28" rx="10" fill="#2563EB" opacity="0.08"/>
  <rect x="25" y="38" width="150" height="10" fill="#2563EB" opacity="0.08"/>
  <rect x="40" y="30" width="60" height="5" rx="2.5" fill="#2563EB" opacity="0.3"/>
  <!-- Image placeholder -->
  <rect x="35" y="56" width="130" height="40" rx="6" fill="#0D9488" opacity="0.08"/>
  <circle cx="100" cy="76" r="10" fill="#0D9488" opacity="0.15"/>
  <path d="M95 76 L100 72 L105 76 L100 80Z" fill="#0D9488" opacity="0.3"/>
  <!-- Text lines -->
  <rect x="35" y="105" width="120" height="4" rx="2" fill="#334155" opacity="0.15"/>
  <rect x="35" y="114" width="100" height="4" rx="2" fill="#334155" opacity="0.1"/>
  <rect x="35" y="123" width="110" height="4" rx="2" fill="#334155" opacity="0.1"/>
