  <rect x="215" y="160" width="50" height="14" rx="4" fill="#2563EB" opacity="0.08"/>
  <text x="240" y="170" font-family="Inter, sans-serif" font-size="7" fill="#2563EB" font-weight="600" text-anchor="middle">68% Open</text>
  <rect x="272" y="160" width="50" height="14" rx="4" fill="#0D9488" opacity="0.08"/>
  <text x="297" y="170" font-family="Inter, sans-serif" font-size="7" fill="#0D9488" font-weight="600" text-anchor="middle">24% Click</text>
  <rect x="329" y="160" width="42" height="14" rx="4" fill="#F59E0B" opacity="0.08"/>
  <text x="350" y="170" font-family="Inter, sans-serif" font-size="7" fill="#D97706" font-weight="600" text-anchor="middle">8% Conv</text>
