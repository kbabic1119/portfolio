  <!-- Chart area -->
  <line x1="215" y1="140" x2="360" y2="140" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="215" y1="120" x2="360" y2="120" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="215" y1="100" x2="360" y2="100" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="215" y1="80" x2="360" y2="80" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="215" y1="60" x2="360" y2="60" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <!-- Bar chart -->
  <rect x="222" y="95" width="14" height="45" rx="3" fill="#2563EB" opacity="0.6"/>
  <rect x="244" y="80" width="14" height="60" rx="3" fill="#2563EB" opacity="0.7"/>
  <rect x="266" y="70" width="14" height="70" rx="3" fill="#0D9488" opacity="0.7"/>
  <rect x="288" y="60" width="14" height="80" rx="3" fill="#0D9488" opacity="0.8"/>
  <rect x="310" y="55" width="14" height="85" rx="3" fill="#F59E0B" opacity="0.7"/>
  <rect x="332" y="50" width="14" height="90" rx="3" fill="#F59E0B" opacity="0.8"/>
  <!-- Labels -->
  <text x="229" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Mon</text>
  <text x="251" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Tue</text>
  <text x="273" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Wed</text>
  <text x="295" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Thu</text>
  <text x="317" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Fri</text>
  <text x="339" y="152" font-family="Inter, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Sat</text>
